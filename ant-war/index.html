<!DOCTYPE html>
<html>
<head>
  <title>Ant War+</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ======================
// WORLD SETTINGS
// ======================
const WORLD_SIZE = 3000;

let camera = { x: 0, y: 0 };

// ======================
// ENTITIES
// ======================
let ants = [];
let food = [];
let playerFood = 5;

let queen = {
  x: WORLD_SIZE / 2,
  y: WORLD_SIZE / 2,
  hp: 100,
  speed: 3
};

// ======================
// HELPERS
// ======================
function rand(min, max) {
  return Math.random() * (max - min) + min;
}

function worldToScreen(x, y) {
  return {
    x: x - camera.x,
    y: y - camera.y
  };
}

// ======================
// DIRT TEXTURE (NO TILING LOOK)
// ======================
function createDirtTexture(size = 1000) {
  const c = document.createElement("canvas");
  c.width = size;
  c.height = size;
  const g = c.getContext("2d");

  g.fillStyle = "#3b2a1f";
  g.fillRect(0, 0, size, size);

  // fine noise
  for (let i = 0; i < 8000; i++) {
    let x = Math.random() * size;
    let y = Math.random() * size;

    let shade = 30 + Math.random() * 50;
    g.fillStyle = `rgb(${shade + 20}, ${shade + 10}, ${shade})`;

    g.fillRect(x, y, 1.5, 1.5);
  }

  // dirt clumps
  for (let i = 0; i < 500; i++) {
    let x = Math.random() * size;
    let y = Math.random() * size;

    g.fillStyle = `rgba(15, 10, 8, 0.15)`;

    g.beginPath();
    g.ellipse(
      x,
      y,
      10 + Math.random() * 25,
      6 + Math.random() * 20,
      Math.random(),
      0,
      Math.PI * 2
    );
    g.fill();
  }

  return c;
}

const dirt = createDirtTexture(1200);

// ======================
// INPUT
// ======================
let keys = {};
window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// spawn ants
window.addEventListener("click", () => {
  if (playerFood > 0) {
    ants.push({
      x: queen.x,
      y: queen.y,
      speed: 2,
      carrying: false,
      target: null,
      hp: 20,
      anim: Math.random() * 1000
    });
    playerFood--;
  }
});

// ======================
// FOOD
// ======================
for (let i = 0; i < 120; i++) {
  food.push({
    x: rand(0, WORLD_SIZE),
    y: rand(0, WORLD_SIZE)
  });
}

// ======================
// DRAW ANT (ANIMATED)
// ======================
function drawAnt(a, color) {
  let p = worldToScreen(a.x, a.y);

  let t = Date.now() * 0.01 + a.anim;

  ctx.strokeStyle = color;
  ctx.lineWidth = 1;

  // legs animation
  for (let i = -1; i <= 1; i++) {
    let swing = Math.sin(t + i) * 4;

    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    ctx.lineTo(p.x + swing, p.y + i * 6);
    ctx.stroke();
  }

  // body segments
  ctx.fillStyle = color;

  ctx.beginPath();
  ctx.arc(p.x - 4, p.y, 3, 0, Math.PI * 2);
  ctx.fill();

  ctx.beginPath();
  ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
  ctx.fill();

  ctx.beginPath();
  ctx.arc(p.x + 5, p.y, 3, 0, Math.PI * 2);
  ctx.fill();
}

// ======================
// UPDATE
// ======================
function update() {
  // queen movement
  if (keys["w"]) queen.y -= queen.speed;
  if (keys["s"]) queen.y += queen.speed;
  if (keys["a"]) queen.x -= queen.speed;
  if (keys["d"]) queen.x += queen.speed;

  // camera follows queen
  camera.x = queen.x - canvas.width / 2;
  camera.y = queen.y - canvas.height / 2;

  // ants logic
  ants.forEach(a => {
    if (!a.carrying) {
      if (!a.target && food.length > 0) {
        a.target = food[Math.floor(Math.random() * food.length)];
      }

      if (a.target) {
        let dx = a.target.x - a.x;
        let dy = a.target.y - a.y;
        let d = Math.hypot(dx, dy);

        if (d < 5) {
          a.carrying = true;
          food = food.filter(f => f !== a.target);
          a.target = null;
        } else {
          a.x += dx / d * a.speed;
          a.y += dy / d * a.speed;
        }
      }
    } else {
      let dx = queen.x - a.x;
      let dy = queen.y - a.y;
      let d = Math.hypot(dx, dy);

      if (d < 10) {
        a.carrying = false;
        playerFood++;
      } else {
        a.x += dx / d * a.speed;
        a.y += dy / d * a.speed;
      }
    }
  });
}

// ======================
// DRAW
// ======================
function draw() {
  // background (no tiling visible)
  let x = -camera.x % dirt.width;
  let y = -camera.y % dirt.height;

  ctx.drawImage(dirt, x, y);
  ctx.drawImage(dirt, x - dirt.width, y);
  ctx.drawImage(dirt, x, y - dirt.height);
  ctx.drawImage(dirt, x - dirt.width, y - dirt.height);

  // food
  ctx.fillStyle = "lime";
  food.forEach(f => {
    let p = worldToScreen(f.x, f.y);
    ctx.beginPath();
    ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
    ctx.fill();
  });

  // ants
  ants.forEach(a => drawAnt(a, "white"));

  // queen
  drawAnt(queen, "cyan");

  // UI
  ctx.fillStyle = "white";
  ctx.fillText("Food: " + playerFood, 10, 20);
  ctx.fillText("Ants: " + ants.length, 10, 40);
  ctx.fillText("Move: WASD | Click = spawn ant", 10, 60);
}

// ======================
// LOOP
// ======================
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
