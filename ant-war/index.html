<!DOCTYPE html>
<html>
<head>
  <title>Ant War+</title>
  <style>
    body { margin: 0; background: #111; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ----------------------
// WORLD SETTINGS
// ----------------------
const WORLD_SIZE = 3000;

let camera = { x: 0, y: 0, zoom: 1 };

// ----------------------
// ENTITIES
// ----------------------
let ants = [];
let enemies = [];
let food = [];

let playerFood = 5;

let queen = {
  x: WORLD_SIZE / 2,
  y: WORLD_SIZE / 2,
  hp: 100
};

// ----------------------
// HELPERS
// ----------------------
function rand(min, max) {
  return Math.random() * (max - min) + min;
}

function dist(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y);
}

function worldToScreen(x, y) {
  return {
    x: (x - camera.x) * camera.zoom,
    y: (y - camera.y) * camera.zoom
  };
}

// ----------------------
// SPAWN
// ----------------------
for (let i = 0; i < 100; i++) {
  food.push({ x: rand(0, WORLD_SIZE), y: rand(0, WORLD_SIZE) });
}

function spawnAnt(type = "worker") {
  ants.push({
    x: queen.x,
    y: queen.y,
    speed: type === "soldier" ? 1.5 : 2,
    carrying: false,
    target: null,
    hp: type === "soldier" ? 50 : 20,
    type
  });
}

function spawnEnemy() {
  enemies.push({
    x: rand(0, WORLD_SIZE),
    y: rand(0, WORLD_SIZE),
    speed: 1.2,
    hp: 40
  });
}

// ----------------------
// INPUT
// ----------------------
let keys = {};
window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// Spawn ants
window.addEventListener("click", () => {
  if (playerFood >= 1) {
    spawnAnt("worker");
    playerFood--;
  }
});

// Soldier spawn
window.addEventListener("contextmenu", e => {
  e.preventDefault();
  if (playerFood >= 3) {
    spawnAnt("soldier");
    playerFood -= 3;
  }
});

// Zoom
window.addEventListener("wheel", e => {
  camera.zoom += e.deltaY * -0.001;
  camera.zoom = Math.max(0.5, Math.min(2, camera.zoom));
});

// ----------------------
// GAME LOOP
// ----------------------
let enemyTimer = 0;

function update() {
  // Camera movement
  if (keys["w"]) camera.y -= 10;
  if (keys["s"]) camera.y += 10;
  if (keys["a"]) camera.x -= 10;
  if (keys["d"]) camera.x += 10;

  // Keep camera in bounds
  camera.x = Math.max(0, Math.min(WORLD_SIZE, camera.x));
  camera.y = Math.max(0, Math.min(WORLD_SIZE, camera.y));

  // Enemies spawn
  enemyTimer++;
  if (enemyTimer > 180) {
    spawnEnemy();
    enemyTimer = 0;
  }

  // Ant logic
  ants.forEach(ant => {
    if (ant.hp <= 0) return;

    // ATTACK MODE (soldiers prioritize enemies)
    let targetEnemy = enemies.find(e => dist(ant, e) < 120);

    if (ant.type === "soldier" && targetEnemy) {
      let dx = targetEnemy.x - ant.x;
      let dy = targetEnemy.y - ant.y;
      let d = Math.hypot(dx, dy);

      if (d < 10) {
        targetEnemy.hp -= 0.6;
      } else {
        ant.x += dx / d * ant.speed;
        ant.y += dy / d * ant.speed;
      }
      return;
    }

    // Worker logic
    if (!ant.carrying) {
      if (!ant.target && food.length > 0) {
        ant.target = food[Math.floor(Math.random() * food.length)];
      }

      if (ant.target) {
        let dx = ant.target.x - ant.x;
        let dy = ant.target.y - ant.y;
        let d = Math.hypot(dx, dy);

        if (d < 5) {
          ant.carrying = true;
          food = food.filter(f => f !== ant.target);
          ant.target = null;
        } else {
          ant.x += dx / d * ant.speed;
          ant.y += dy / d * ant.speed;
        }
      }
    } else {
      let dx = queen.x - ant.x;
      let dy = queen.y - ant.y;
      let d = Math.hypot(dx, dy);

      if (d < 10) {
        ant.carrying = false;
        playerFood++;
      } else {
        ant.x += dx / d * ant.speed;
        ant.y += dy / d * ant.speed;
      }
    }
  });

  // Enemy logic
  enemies.forEach(e => {
    let target = queen;
    let minDist = dist(e, queen);

    ants.forEach(a => {
      let d = dist(e, a);
      if (d < minDist) {
        minDist = d;
        target = a;
      }
    });

    let dx = target.x - e.x;
    let dy = target.y - e.y;
    let d = Math.hypot(dx, dy);

    if (d > 0) {
      e.x += dx / d * e.speed;
      e.y += dy / d * e.speed;
    }

    if (d < 10) {
      if (target === queen) {
        queen.hp -= 0.1;
      } else {
        target.hp -= 0.3;
      }
    }
  });

  // Cleanup
  ants = ants.filter(a => a.hp > 0);
  enemies = enemies.filter(e => e.hp > 0);
}

function draw() {
  ctx.fillStyle = "#111";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Food
  ctx.fillStyle = "lime";
  food.forEach(f => {
    let p = worldToScreen(f.x, f.y);
    ctx.beginPath();
    ctx.arc(p.x, p.y, 4 * camera.zoom, 0, Math.PI * 2);
    ctx.fill();
  });

  // Ants
  ants.forEach(a => {
    let p = worldToScreen(a.x, a.y);
    ctx.fillStyle = a.type === "soldier" ? "orange" : "white";
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3 * camera.zoom, 0, Math.PI * 2);
    ctx.fill();
  });

  // Enemies
  ctx.fillStyle = "red";
  enemies.forEach(e => {
    let p = worldToScreen(e.x, e.y);
    ctx.beginPath();
    ctx.arc(p.x, p.y, 4 * camera.zoom, 0, Math.PI * 2);
    ctx.fill();
  });

  // Queen
  let qp = worldToScreen(queen.x, queen.y);
  ctx.fillStyle = "cyan";
  ctx.beginPath();
  ctx.arc(qp.x, qp.y, 10 * camera.zoom, 0, Math.PI * 2);
  ctx.fill();

  // UI
  ctx.fillStyle = "white";
  ctx.font = "16px Arial";
  ctx.fillText("Food: " + playerFood, 10, 20);
  ctx.fillText("Ants: " + ants.length, 10, 40);
  ctx.fillText("HP: " + Math.floor(queen.hp), 10, 60);
  ctx.fillText("Left click = worker | Right click = soldier", 10, 80);
}

function loop() {
  update();
  draw();

  if (queen.hp > 0) {
    requestAnimationFrame(loop);
  } else {
    alert("Colony wiped out 💀");
  }
}

loop();
</script>
</body>
</html>
