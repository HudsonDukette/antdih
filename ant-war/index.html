<!DOCTYPE html>
<html>
<head>
  <title>Ant War+</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ----------------------
// WORLD
// ----------------------
const WORLD_SIZE = 3000;

let camera = { x: 0, y: 0 };

// ----------------------
// ENTITIES
// ----------------------
let ants = [];
let enemies = [];
let food = [];

let playerFood = 5;

let queen = {
  x: WORLD_SIZE / 2,
  y: WORLD_SIZE / 2,
  hp: 100,
  speed: 3
};

// ----------------------
// HELPERS
// ----------------------
function rand(min, max) {
  return Math.random() * (max - min) + min;
}

function dist(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y);
}

function worldToScreen(x, y) {
  return {
    x: x - camera.x,
    y: y - camera.y
  };
}

// ----------------------
// DIRT BACKGROUND
// ----------------------
let dirtCanvas = document.createElement("canvas");
dirtCanvas.width = 200;
dirtCanvas.height = 200;
let dirtCtx = dirtCanvas.getContext("2d");

// generate dirt pattern
for (let i = 0; i < 500; i++) {
  dirtCtx.fillStyle = `rgb(${rand(80,120)},${rand(60,90)},${rand(40,60)})`;
  dirtCtx.fillRect(rand(0,200), rand(0,200), rand(2,6), rand(2,6));
}

let dirtPattern = ctx.createPattern(dirtCanvas, "repeat");

// ----------------------
// SPAWN
// ----------------------
for (let i = 0; i < 100; i++) {
  food.push({ x: rand(0, WORLD_SIZE), y: rand(0, WORLD_SIZE) });
}

function spawnAnt(type = "worker") {
  ants.push({
    x: queen.x,
    y: queen.y,
    speed: type === "soldier" ? 1.5 : 2,
    carrying: false,
    target: null,
    hp: type === "soldier" ? 50 : 20,
    type,
    anim: rand(0, 1000)
  });
}

// ----------------------
// INPUT
// ----------------------
let keys = {};
window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// Spawn ants
window.addEventListener("click", () => {
  if (playerFood >= 1) {
    spawnAnt("worker");
    playerFood--;
  }
});

window.addEventListener("contextmenu", e => {
  e.preventDefault();
  if (playerFood >= 3) {
    spawnAnt("soldier");
    playerFood -= 3;
  }
});

// ----------------------
// DRAW ANT (WITH LEGS)
// ----------------------
function drawAnt(a, color) {
  let p = worldToScreen(a.x, a.y);

  let t = Date.now() * 0.01 + a.anim;

  ctx.strokeStyle = color;
  ctx.lineWidth = 1;

  // legs
  for (let i = -1; i <= 1; i++) {
    let offset = Math.sin(t + i) * 4;

    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    ctx.lineTo(p.x + offset, p.y + i * 6);
    ctx.stroke();
  }

  // body segments
  ctx.fillStyle = color;

  ctx.beginPath();
  ctx.arc(p.x - 4, p.y, 3, 0, Math.PI * 2);
  ctx.fill();

  ctx.beginPath();
  ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
  ctx.fill();

  ctx.beginPath();
  ctx.arc(p.x + 5, p.y, 3, 0, Math.PI * 2);
  ctx.fill();
}

// ----------------------
// GAME LOOP
// ----------------------
function update() {
  // Queen movement
  if (keys["w"]) queen.y -= queen.speed;
  if (keys["s"]) queen.y += queen.speed;
  if (keys["a"]) queen.x -= queen.speed;
  if (keys["d"]) queen.x += queen.speed;

  // camera follows queen
  camera.x = queen.x - canvas.width / 2;
  camera.y = queen.y - canvas.height / 2;

  // Ant logic
  ants.forEach(ant => {
    if (ant.hp <= 0) return;

    if (!ant.carrying) {
      if (!ant.target && food.length > 0) {
        ant.target = food[Math.floor(Math.random() * food.length)];
      }

      if (ant.target) {
        let dx = ant.target.x - ant.x;
        let dy = ant.target.y - ant.y;
        let d = Math.hypot(dx, dy);

        if (d < 5) {
          ant.carrying = true;
          food = food.filter(f => f !== ant.target);
          ant.target = null;
        } else {
          ant.x += dx / d * ant.speed;
          ant.y += dy / d * ant.speed;
        }
      }
    } else {
      let dx = queen.x - ant.x;
      let dy = queen.y - ant.y;
      let d = Math.hypot(dx, dy);

      if (d < 10) {
        ant.carrying = false;
        playerFood++;
      } else {
        ant.x += dx / d * ant.speed;
        ant.y += dy / d * ant.speed;
      }
    }
  });

  ants = ants.filter(a => a.hp > 0);
}

function draw() {
  // dirt background
  ctx.fillStyle = dirtPattern;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Food
  ctx.fillStyle = "lime";
  food.forEach(f => {
    let p = worldToScreen(f.x, f.y);
    ctx.beginPath();
    ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
    ctx.fill();
  });

  // Ants
  ants.forEach(a => {
    drawAnt(a, a.type === "soldier" ? "orange" : "white");
  });

  // Queen
  drawAnt(queen, "cyan");

  // UI
  ctx.fillStyle = "white";
  ctx.fillText("Food: " + playerFood, 10, 20);
  ctx.fillText("Ants: " + ants.length, 10, 40);
  ctx.fillText("HP: " + Math.floor(queen.hp), 10, 60);
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
